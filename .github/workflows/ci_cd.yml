name: CI/CD para DAGs de Airflow

on:
  push:
    branches:
      - 'feature/**'
  pull_request:
    branches:
      - development

jobs:
  ci:
    name: CI - Validar código y pruebas
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Agregar directorio raíz al PYTHONPATH
      run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB_ENV
    - name: Validar sintaxis de los DAGs
      run: python -m py_compile dags/*.py

    - name: Linter (simulado)
      run: echo "✅ Aquí se correría un linter como ruff o flake8"

    - name: Ejecutar pruebas unitarias
      run: pytest tests/

    - name: Validar convenciones de nombres (simulado)
      run: echo "✅ Validar que los DAGs sigan convención de nombres"

    - name: Escaneo de seguridad (simulado)
      run: echo "✅ Se ejecutaría un escáner como bandit o safety"

  cd:
    name: CD - Desplegar DAG si es PR a development
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout del código
      uses: actions/checkout@v3

    - name: Simular empaquetado del DAG
      run: |
        echo "📦 Empaquetando DAGs para despliegue..."
        tar -czf dags.tar.gz dags/

    - name: Simular subida a servidor de Airflow
      run: |
        echo "🚀 Subiendo DAGs al entorno productivo (simulado)"
        echo "scp dags.tar.gz usuario@airflow-servidor:/home/airflow/dags/"

    - name: Simular reinicio de servicio de Airflow
      run: echo "🔁 Reiniciando Airflow (simulado)"
